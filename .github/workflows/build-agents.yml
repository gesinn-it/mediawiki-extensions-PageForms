name: Build AGENTS

on:
  push:
    paths:
      - docs/gesinn-it-docs-master-pub
      - docs/gesinn-it-docs-master-pub/**
      - AGENTS-source.adoc
    branches:
      - '**'
  workflow_dispatch:

jobs:

  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor pandoc
          sudo gem install asciidoctor-reducer --pre

      - name: Reduce AGENTS source (flatten includes)
        run: |
          asciidoctor-reducer \
            -o AGENTS.adoc \
            AGENTS-source.adoc

      - name: Convert AsciiDoc to DocBook
        run: |
          asciidoctor \
            -b docbook5 \
            -o AGENTS.xml \
            AGENTS.adoc

      - name: Convert DocBook to Markdown
        run: |
          pandoc \
            -f docbook \
            -t gfm \
            AGENTS.xml \
            -o AGENTS.md

      - name: Add autogenerated header
        run: |
          printf "<!-- THIS FILE IS AUTO-GENERATED. Edit AGENTS-source.adoc instead. -->\n\n" | \
          cat - AGENTS.md > tmp
          mv tmp AGENTS.md

      - name: Remove intermediate files
        run: |
          rm -f \
            AGENTS.adoc \
            AGENTS.xml

      - name: Commit generated AGENTS
        uses: EndBug/add-and-commit@v8
        with:
          add: 'AGENTS.md'
          pull: '--rebase --autostash'
          message: "docs(ci): update generated AGENTS [skip ci]"

  build-instructions:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    needs: build

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: 'true'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y asciidoctor pandoc
          sudo gem install asciidoctor-reducer --pre

      - name: Create output directories
        run: |
          mkdir -p .github/instructions
          mkdir -p src libs tests .github

      - name: Build instructions (scope loop)
        shell: bash
        run: |
          BASE="docs/gesinn-it-docs-master-pub/documents/mediawiki/instructions"

          declare -A APPLY_TO=(
            [php]="**/*.php"
            [js]="**/*.{js,css,less}"
            [testing]="tests/**"
            [ci]=".github/**,Makefile,build/**"
          )

          declare -A SUBTREE_DIR=(
            [php]="src"
            [js]="libs"
            [testing]="tests"
            [ci]=".github"
          )

          for SCOPE in php js testing ci; do
            APPLYTO="${APPLY_TO[$SCOPE]}"
            DIR="${SUBTREE_DIR[$SCOPE]}"

            # Flatten includes
            asciidoctor-reducer \
              -a phan \
              -o /tmp/${SCOPE}.adoc \
              ${BASE}/${SCOPE}.adoc

            # Convert to DocBook
            asciidoctor \
              -b docbook5 \
              -o /tmp/${SCOPE}.xml \
              /tmp/${SCOPE}.adoc

            # Convert to Markdown
            pandoc \
              -f docbook \
              -t gfm \
              /tmp/${SCOPE}.xml \
              -o /tmp/${SCOPE}.md

            # --- Copilot output: .github/instructions/{scope}.instructions.md ---
            printf '%s\n%s\n%s\n%s\n\n' \
              '---' \
              "applyTo: \"${APPLYTO}\"" \
              '---' \
              "<!-- AUTO-GENERATED from docs/gesinn-it-docs-master-pub/documents/mediawiki/instructions/${SCOPE}.adoc -->" \
              | cat - /tmp/${SCOPE}.md \
              > .github/instructions/${SCOPE}.instructions.md

            # --- Other agents output: {dir}/AGENTS.md ---
            printf '%s\n\n' \
              "<!-- AUTO-GENERATED from docs/gesinn-it-docs-master-pub/documents/mediawiki/instructions/${SCOPE}.adoc -->" \
              | cat - /tmp/${SCOPE}.md \
              > ${DIR}/AGENTS.md
          done

      - name: Commit generated instruction files
        uses: EndBug/add-and-commit@v8
        with:
          add: |
            .github/instructions/
            .github/AGENTS.md
            src/AGENTS.md
            libs/AGENTS.md
            tests/AGENTS.md
          pull: '--rebase --autostash'
          message: "docs(ci): update generated instructions [skip ci]"

