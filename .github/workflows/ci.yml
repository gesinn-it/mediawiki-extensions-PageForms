name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-22.04
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mediawiki_version: '1.35'
            smw_version: '4.2.0'    # SemanticMediaWiki
            php_version: 7.4        # PHP
            dt_version: 3.1         # DisplayTitle
            database_type: mysql
            database_image: "mysql:5.7"
            coverage: false
            experimental: false
          - mediawiki_version: '1.39'
            smw_version: '5.1.0'
            php_version: 8.1
            dt_version: 4.0.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: false
          - mediawiki_version: '1.43'
            smw_version: '6.0.1'
            php_version: 8.3
            dt_version: 4.0.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: true
            experimental: false
          - mediawiki_version: '1.43'
            smw_version: 'dev-master'
            php_version: 8.3
            dt_version: 4.0.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: true

    env:
      MW_VERSION: ${{ matrix.mediawiki_version }}
      SMW_VERSION: ${{ matrix.smw_version }}
      PHP_VERSION: ${{ matrix.php_version }}
      DT_VERSION: ${{ matrix.dt_version }}
      DB_TYPE: ${{ matrix.database_type }}
      DB_IMAGE: ${{ matrix.database_image }}
      # Run JS tests only for the coverage entry (MW 1.43): older base images
      # ship a Node version too old for eslint-plugin-jsdoc (requires Node ≥ 14.6).
      NODE_JS: ${{ matrix.coverage && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
                   
      - name: Update submodules
        run: git submodule update --init --remote
  
      - name: Run tests
        run: make ci
        if: matrix.coverage == false

      - name: Run tests with coverage
        run: make ci-coverage
        if: matrix.coverage == true

      - name: Upload code coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/php/coverage.xml,coverage/js/clover.xml
        if: matrix.coverage == true
