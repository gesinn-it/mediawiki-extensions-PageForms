name: CI

on:
  push:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
      - '.github/copilot-instructions.md'
      - 'docs/.submodule-ref'
  pull_request:
    branches: [ master ]
    paths-ignore:
      - '**/*.adoc'
      - '.github/copilot-instructions.md'
      - 'docs/.submodule-ref'
  workflow_dispatch:

jobs:

  psr4-guard:

    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check src/ for strict_types and namespace declarations
        run: |
          status=0
          while IFS= read -r -d '' file; do
            if ! grep -q "declare( strict_types *= *1 *);" "$file"; then
              echo "::error file=$file::missing declare( strict_types=1 );"
              status=1
            fi
            if ! grep -q "^namespace MediaWiki\\\\Extension\\\\PageForms" "$file"; then
              echo "::error file=$file::missing namespace MediaWiki\\Extension\\PageForms declaration"
              status=1
            fi
          done < <(find src -name '*.php' -print0)
          exit $status

  test:

    runs-on: ubuntu-24.04
    continue-on-error: ${{ matrix.experimental }}

    strategy:
      matrix:
        include:
          - mediawiki_version: '1.39'
            smw_version: '5.1.0'
            php_version: 8.1
            dt_version: 4.0.3
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: false
          - mediawiki_version: '1.43'
            smw_version: '6.0.1'
            php_version: 8.3
            dt_version: 4.0.3
            al_version: 0.7
            database_type: mysql
            database_image: "mysql:8"
            coverage: true
            experimental: false
          - mediawiki_version: '1.43'
            smw_version: '7.2.0'
            php_version: 8.3
            dt_version: 4.0.3
            al_version: 0.7
            database_type: mysql
            database_image: "mysql:8"
            coverage: false
            experimental: true
          - mediawiki_version: '1.43'
            smw_version: '7.2.0'
            php_version: 8.3
            dt_version: 4.0.3
            al_version: 0.7
            database_type: mysql
            database_image: "mariadb:10.11"
            coverage: false
            experimental: false

    env:
      MW_VERSION: ${{ matrix.mediawiki_version }}
      SMW_VERSION: ${{ matrix.smw_version }}
      PHP_VERSION: ${{ matrix.php_version }}
      DT_VERSION: ${{ matrix.dt_version }}
      AL_VERSION: ${{ matrix.al_version }}
      DB_TYPE: ${{ matrix.database_type }}
      DB_IMAGE: ${{ matrix.database_image }}
      # Run JS tests only for the coverage entry (MW 1.43): older base images
      # ship a Node version too old for eslint-plugin-jsdoc (requires Node ≥ 14.6).
      NODE_JS: ${{ matrix.coverage && '1' || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
                   
      - name: Update submodules
        run: git submodule update --init --remote
  
      - name: Run tests
        run: make ci
        if: matrix.coverage == false

      - name: Run Phan static analysis
        run: make install composer-phan
        if: matrix.coverage == true

      - name: Run tests with coverage
        run: make ci-coverage
        if: matrix.coverage == true

      - name: Upload code coverage
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          # Coverage files are written into the Docker volume mounted at
          # build/coverage/ (see build/docker-compose-ci.yml), NOT at the
          # repo root.  Using the correct paths ensures Codecov applies the
          # codecov.yml path fixes and resolves PHP paths correctly.
          files: build/coverage/php/coverage.xml,build/coverage/js/clover.xml
        if: matrix.coverage == true
